<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Галерея — УЕБИЩЬ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-theme="dark" data-page="gallery">
  <div class="bg-fog" aria-hidden="true">
    <div class="fog-layer fog-1"></div><div class="fog-layer fog-2"></div><div class="fog-layer fog-3"></div>
  </div>
  <div class="bg-vignette" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="cursor" id="cursor" aria-hidden="true"><div class="cursor-ring"></div><div class="cursor-dot"></div></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>
  <div id="site-header"></div>
  <main>
    <div class="page-header">
      <span class="page-header__eyebrow">СКРИНШОТЫ</span>
      <h1 class="glitch" data-text="Галерея">Галерея</h1>
    </div>
    <section class="features" style="padding-top:0;">
      <div class="gallery-grid" id="galleryGrid"></div>
      <div class="gallery-more-wrap">
        <button id="galleryMore" class="btn btn--primary" hidden>Показать ещё</button>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox__close" data-close aria-label="Закрыть">✕</button>
    <figure class="lightbox__figure">
      <img id="lightboxImg" src="" alt="" />
      <figcaption class="lightbox__caption" id="lightboxCaption"></figcaption>
    </figure>
  </div>

  <script src="assets/js/site.js"></script>
  <script src="assets/js/gallery.js"></script>
</body>
</html>
