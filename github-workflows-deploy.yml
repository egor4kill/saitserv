name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Забираем код
        uses: actions/checkout@v4

      - name: Ставим Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ставим sharp и обрабатываем фото (делаем -thumb/-full webp)
        run: |
          npm install sharp --no-save
          node scripts/process-images.js

      - name: Сохраняем сгенерированные webp обратно в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/gallery/*.webp || true
          git diff --staged --quiet || git commit -m "auto: сгенерированы webp-версии фото"
          git push || true

      - name: Готовим сайт к публикации
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Публикуем на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
